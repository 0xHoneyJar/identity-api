name: CI

# PR test gate. Runs the full suite (non-DB) plus the DB-backed proofs that
# previously only ran locally — the migration-reversibility + privacy-floor
# tests for the auth SoR. Without this, those tests `skipIf(!TEST_DATABASE_URL)`
# and silently skip in CI.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (bun + postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          # DB name carries a scratch hint ("ci") so the DB-dropping test
          # harness (looksLikeScratchUrl) accepts it.
          POSTGRES_DB: identity_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/identity_ci

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply migrations (0001..0008)
        run: bun scripts/migrate.ts up

      - name: Full suite (non-DB)
        # TEST_DATABASE_URL intentionally UNSET → the DB-dropping tests skip here.
        # DATABASE_URL is set so app/route tests run against the migrated schema.
        run: bun test

      - name: DB-backed proofs (privacy floor + migration reversibility)
        # The load-bearing auth-SoR proofs. They drop+remigrate, so they run in
        # their own step against the scratch-named DB, isolated from the suite
        # above and from the pre-existing brittle shared-DB tests.
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/identity_ci
        run: |
          bun test \
            packages/adapters/src/__tests__/world_name_model.test.ts \
            packages/adapters/src/__tests__/postgres-spine-adapter-names.test.ts \
            scripts/__tests__/backfill-wallet-only-from-midi-revert.test.ts \
            src/api/__tests__/wallet-only-e2e-goal-validation.test.ts
